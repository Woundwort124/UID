version: "4.1"
name: UID
type: RISC-V
deviceName: null
packDir: null
srcDirs:
  - Core
  - Debug
  - FreeRTOS
  - Ld
  - Peripheral
  - Startup
  - User
virtualFolder:
  name: <virtual_root>
  files: []
  folders: []
dependenceList: []
outDir: build
miscInfo:
  uid: 34e6a46735e9e23fe17361321dccc72c
targets:
  obj:
    cppPreprocessAttrs:
      defineList: []
      incList:
        - Debug
        - Core
        - User
        - Peripheral/inc
        - FreeRTOS
        - FreeRTOS/include
        - FreeRTOS/portable/Common
        - FreeRTOS/portable/GCC/RISC-V
        - FreeRTOS/portable/GCC/RISC-V/chip_specific_extensions/RV32I_PFIC_no_extensions
        - FreeRTOS/portable/MemMang
      libList: []
    excludeList:
      - FreeRTOS/portable/Common/mpu_wrappers.c
      - Startup
      - Ld
      - startup_ch32v30x_D8.S
    settings: {}
    toolchain: RISCV_GCC
    toolchainConfigMap:
      RISCV_GCC:
        linkerScriptPath: Ld/Link.ld
        options:
          version: 2
          afterBuildTasks: []
          asm-compiler:
            ASM_FLAGS: -Wl,-Bstatic
          beforeBuildTasks: []
          c/cpp-compiler:
            CXX_FLAGS: ""
            C_FLAGS: -Wl,-Bstatic
            language-c: gnu99
            language-cpp: c++11
            one-elf-section-per-data: true
            one-elf-section-per-function: true
            optimization: level-size
            signed-char: true
            warnings: all-warnings
          global:
            abi: ilp32
            arch: rv32imac
            code-model: medlow
            misc-control:
              - -fmessage-length=0
              - -Wunused
              - -Wuninitialised
              - -msave-restore
              - -fno-common
            output-debug-info: enable
          linker:
            $outputTaskExcludes:
              - .bin
            LD_FLAGS: -nostartfiles --specs=nano.specs --specs=nosys.specs
            LIB_FLAGS: -lm
            output-format: elf
            remove-unused-input-sections: true
    uploadConfigMap:
      JLink:
        baseAddr: ""
        bin: ""
        cpuInfo:
          cpuName: "null"
          vendor: "null"
        otherCmds: ""
        proType: 1
        speed: 8000
    uploader: JLink
